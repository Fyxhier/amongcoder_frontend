<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among the Code - VS Code Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        * { font-family: 'JetBrains Mono', monospace; box-sizing: border-box; }
        body { background: #1e1e1e; color: #cccccc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; margin:0; }
        .modal-anim { animation: modalPop 0.18s cubic-bezier(.4,0,.2,1); }
        @keyframes modalPop { from { transform: scale(0.93) translateY(8px); opacity: 0; } to { transform: scale(1); translateY(0); opacity: 1; } }
        .countdown-anim { animation: countPop 0.4s cubic-bezier(.4,0,.2,1); }
        @keyframes countPop { 0% { transform: scale(2.5); opacity: 0; } 60% { opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        textarea { font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.6; tab-size: 4; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        input[type=text], input[type=number] {
            background: #2d2d2e; border: 1px solid #3d3d3d; color: #ccc;
            border-radius: 8px; padding: 8px 12px; outline: none; width: 100%;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
        }
        input:focus { border-color: #007acc; }
        .btn { cursor: pointer; border: none; font-family: 'JetBrains Mono', monospace;
            font-size: 12px; border-radius: 8px; padding: 8px 16px; transition: all 0.12s; }
        .btn:active { transform: scale(0.96); }
        .btn-blue   { background: #007acc; color: white; } .btn-blue:hover   { background: #0090e8; }
        .btn-green  { background: #22c55e; color: #000;  } .btn-green:hover  { background: #16a34a; color:#fff; }
        .btn-red    { background: #ef4444; color: white; } .btn-red:hover    { background: #dc2626; }
        .btn-gray   { background: #37373d; color: #ccc;  } .btn-gray:hover   { background: #484848; }
        .btn-purple { background: #a855f7; color: white; } .btn-purple:hover { background: #9333ea; }
        .btn-amber  { background: #f59e0b; color: #000;  } .btn-amber:hover  { background: #d97706; }
        .player-row { display:flex; align-items:center; gap:12px; background:#1e1e1e; border:1px solid #2d2d2e; border-radius:14px; padding:10px 14px; }
        .vscode-item { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; color:#ccc; transition:background 0.1s; }
        .vscode-item:hover { background:#2d2d2e; color:white; }
        .fit-text { overflow:hidden; white-space:nowrap; }
        .fit-sm  { font-size:10px !important; }
        .fit-md  { font-size:12px !important; }
        .tab-active { border-bottom: 2px solid #007acc; background: #1e1e1e; color: white; }

        .peer-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .peer-ok   { background:#22c55e; box-shadow:0 0 6px #22c55e; }
        .peer-wait { background:#f59e0b; animation: blink 1s infinite; }
        .peer-err  { background:#ef4444; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .speaking-ring { animation: speakPulse 0.6s infinite alternate; }
        @keyframes speakPulse {
            from { box-shadow: 0 0 0 2px #22c55e40; }
            to   { box-shadow: 0 0 0 8px #22c55e80; }
        }
        .copy-btn { cursor:pointer; font-size:10px; color:#007acc; padding:2px 8px; border:1px solid #007acc; border-radius:6px; }
        .copy-btn:hover { background:#007acc; color:white; }
    </style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh;"></div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const COLORS  = ['#22c55e','#ef4444','#3b82f6','#f59e0b','#a855f7'];
const AVATARS = ['👾','🔴','🔵','🟡','🟣'];

const files = {
    'main.game.js': { content:`// Coding Phase!\nfunction startGame() {\n    console.log("🎮 Game started!");\n}`, lang:'javascript', icon:'🟦' },
    'script.py':    { content:`# Python game logic\ndef run():\n    print("Hello Python!")`, lang:'python', icon:'🐍' },
    'Main.java':    { content:`public class Main {\n    public static void main(String[] a) {\n        System.out.println("Java!");\n    }\n}`, lang:'java', icon:'☕' },
    'game.cpp':     { content:`#include<iostream>\nusing namespace std;\nint main(){\n    cout<<"C++"<<endl;\n}`, lang:'cpp', icon:'⚙️' }
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let S = {
    peer: null,
    peerId: null,
    peerStatus: 'connecting',
    connections: {},
    myName: 'Player',
    myColor: COLORS[0],
    myAvatar: AVATARS[0],
    phase: 'lobby',
    isHost: false,
    roomId: null,
    roomName: '',
    maxPlayers: 5,
    players: [],
    modal: null,
    showChat: false,
    showMeetingChat: false,
    voiceActive: false,
    chatMessages: [],
    meetingChatMessages: [{from:'System',msg:'Meeting started!',color:'#858585'}],
    currentFile: 'main.game.js',
    tabsMinimized: false,
    showTerminal: false,
    terminalOutput: '',
    showMeeting: false,
    selectedVote: null,
    roundTime: 60,
    meetingTime: 30,
    notification: null,
    countdown: null,
    debugLog: [],
    // Role phase
    myRole: null,          // 'dev' | 'vibecoder'
    vibeCoderPeerId: null, // peerId of the one vibe coder
    roleTimer: null,       // seconds remaining on role screen
    // Coding timer
    codingTimer: 300,      // 5 minutes = 300 seconds
    codingTimerRunning: false,
    showRunResult: false,
    runResultTimer: null,  // countdown for run result display (max 15s)
    runResultSecs: 15,
    voteSkipCounts: 0,     // number of players who voted skip
    // File → active players mapping: { filename: [playerObj, ...] }
    fileActivePlayers: {},
};

let mediaStream = null;

// ─────────────────────────────────────────────
//  PEER INIT & ID GENERATOR
// ─────────────────────────────────────────────
function genId() { return Math.floor(100000 + Math.random() * 900000).toString(); }

function initPeer() {
    dbg('Initializing PeerJS...');
    updateStatus('connecting');

    // TẠO TRỰC TIẾP ID 6 SỐ ĐỂ TRÁNH LỖI "PEER UNAVAILABLE"
    const numericId = genId(); 

    const peer = new Peer(numericId, {
        host: '0.peerjs.com',
        port: 443,
        path: '/',
        secure: true,
        debug: 1,
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80',   username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443',  username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
            ]
        }
    });

    S.peer = peer;

    peer.on('open', id => {
        S.peerId = id;
        updateStatus('ready');
        dbg('✅ Peer ready. ID = ' + id);
        render();
    });

    peer.on('connection', conn => {
        dbg('📥 Incoming connection from: ' + conn.peer);
        setupConn(conn);
    });

    peer.on('error', err => {
        dbg('❌ Peer error: ' + err.type + ' — ' + err.message);
        if (err.type === 'peer-unavailable') {
            notify('❌ Không tìm thấy phòng. Kiểm tra lại Room ID.', true);
        } else if (err.type === 'network' || err.type === 'server-error') {
            notify('⚠️ Mất kết nối. Thử reload trang.', true);
            updateStatus('error');
        } else {
            notify('⚠️ ' + err.type, true);
        }
        render();
    });

    peer.on('disconnected', () => {
        dbg('⚠️ Disconnected. Reconnecting...');
        updateStatus('connecting');
        setTimeout(() => { if (!S.peer.destroyed) S.peer.reconnect(); }, 2000);
    });
}

function updateStatus(s) { S.peerStatus = s; renderStatusBar(); }

function renderStatusBar() {
    const el = document.getElementById('peer-status-bar');
    if (!el) return;
    const map = { connecting:['peer-wait','Đang kết nối...'], ready:['peer-ok','P2P Ready'], error:['peer-err','Lỗi kết nối'] };
    const [cls, txt] = map[S.peerStatus] || ['peer-err','Unknown'];
    el.innerHTML = `<span class="peer-dot ${cls}"></span> <span style="font-size:10px;color:#858585">${txt}</span>`;
}

// ─────────────────────────────────────────────
//  CONNECTION SETUP (SỬA LỖI MEMBER KHÔNG NHẬN EVENT)
// ─────────────────────────────────────────────
function setupConn(conn) {
    // FIX: Set up data/close events NGAY LẬP TỨC để không bị lỡ
    conn.on('data', data => {
        dbg('📨 Received: ' + data.type + ' from ' + conn.peer);
        handleMsg(data, conn.peer);
    });

    conn.on('close', () => {
        dbg('🔌 Connection closed: ' + conn.peer);
        delete S.connections[conn.peer];
        S.players = S.players.filter(p => p.peerId !== conn.peer);
        if (S.isHost) broadcast({ type:'PLAYERS_UPDATE', players: S.players });
        addChat('🔴 Một người chơi đã rời phòng', 'system');
        render();
    });

    conn.on('error', e => dbg('Conn error: ' + e));

    // Xử lý lưu connection vào danh sách
    const initOpen = () => {
        dbg('🔗 Connection open: ' + conn.peer);
        S.connections[conn.peer] = conn;
    };

    if (conn.open) initOpen();
    else conn.on('open', initOpen);
}

function connectToPeer(targetId, onOpen) {
    dbg('🔌 Connecting to: ' + targetId);
    if (!S.peer || S.peer.destroyed) { notify('❌ Peer chưa sẵn sàng!', true); return; }
    if (S.peerStatus !== 'ready') { notify('❌ Chờ kết nối mạng xong đã!', true); return; }

    const conn = S.peer.connect(targetId, { reliable: true, serialization: 'json' });

    // FIX: Đăng ký event data/close ngay khi khởi tạo connection
    setupConn(conn);

    conn.on('open', () => {
        onOpen(conn);
    });

    conn.on('error', e => {
        dbg('Connect error: ' + e);
        notify('❌ Không thể kết nối: ' + e, true);
    });

    setTimeout(() => {
        if (!conn.open) {
            notify('❌ Timeout. Phòng không phản hồi.', true);
            dbg('⏱ Connection timeout to ' + targetId);
        }
    }, 8000);
}

function send(peerId, data) {
    const c = S.connections[peerId];
    if (c && c.open) { c.send(data); }
}

function broadcast(data) {
    Object.keys(S.connections).forEach(id => send(id, data));
}

// ─────────────────────────────────────────────
//  MESSAGE HANDLER
// ─────────────────────────────────────────────
function handleMsg(data, fromPeer) {
    switch(data.type) {
        case 'JOIN_REQUEST': {
            if (!S.isHost) return;
            if (S.players.length >= S.maxPlayers) {
                send(fromPeer, { type:'JOIN_DENIED', reason:'Phòng đầy rồi!' });
                return;
            }
            const p = { peerId:fromPeer, name:data.name, color:data.color, avatar:data.avatar, isHost:false, readyVote:false };
            S.players.push(p);
            send(fromPeer, { type:'JOIN_ACCEPTED', players:S.players, roomName:S.roomName, maxPlayers:S.maxPlayers, roomId:S.roomId });
            broadcast({ type:'PLAYERS_UPDATE', players:S.players });
            addChat('🟢 ' + data.name + ' đã vào phòng', 'system');
            render();
            break;
        }
        case 'JOIN_ACCEPTED': {
            S.players    = data.players;
            S.roomName   = data.roomName;
            S.maxPlayers = data.maxPlayers;
            S.roomId     = data.roomId; // Dùng chung Room ID (chính là Peer ID của host)
            S.phase      = 'waiting';
            notify('✅ Đã vào phòng: ' + data.roomName);
            render();
            break;
        }
        case 'JOIN_DENIED': {
            notify('❌ Từ chối: ' + data.reason, true);
            break;
        }
        case 'PLAYERS_UPDATE': {
            S.players = data.players;
            render();
            break;
        }
        case 'CHAT': {
            addChat(data.name + ': ' + data.msg, 'player', data.color);
            break;
        }
        case 'START_COUNTDOWN': {
            doCountdown();
            break;
        }
        case 'SETTINGS_UPDATE': {
            S.roundTime   = data.roundTime;
            S.meetingTime = data.meetingTime;
            addChat('⚙️ Host cập nhật cài đặt game', 'system');
            render();
            break;
        }
        case 'ROLE_ASSIGN': {
            // Member receives role assignment from host
            applyRoles(data.vibeCoderPeerId);
            break;
        }
        case 'FILE_SWITCH': {
            // A peer switched to a different file
            if (!S.fileActivePlayers) S.fileActivePlayers = {};
            Object.keys(S.fileActivePlayers).forEach(f => {
                S.fileActivePlayers[f] = (S.fileActivePlayers[f]||[]).filter(p => p.peerId !== data.peerId);
            });
            if (!S.fileActivePlayers[data.file]) S.fileActivePlayers[data.file] = [];
            S.fileActivePlayers[data.file].push({ peerId: data.peerId, name: data.name, color: data.color });
            // Update file sidebar dots if in coding phase
            if (S.phase === 'coding') {
                Object.keys(files).forEach(fn => {
                    const dotEl = document.getElementById('file-dots-' + fn);
                    if (dotEl) {
                        const players = (S.fileActivePlayers[fn]||[]);
                        dotEl.innerHTML = players.map(p => `<div title="${p.name}" style="width:8px;height:8px;border-radius:2px;background:${p.color};flex-shrink:0;"></div>`).join('');
                    }
                });
            }
            break;
        }
        case 'VOTE_REQUEST': {            if (!S.isHost) return;
            S.players = S.players.map(p => p.peerId === fromPeer ? {...p, readyVote:true} : p);
            broadcast({ type:'PLAYERS_UPDATE', players:S.players });
            const votes  = S.players.filter(p => p.readyVote).length;
            const needed = Math.ceil(S.players.length * 0.8);
            addChat(`🗳️ Vote: ${votes}/${S.players.length} (cần ${needed})`, 'system');
            if (votes >= needed && S.players.length >= 2) {
                broadcast({ type:'START_COUNTDOWN' });
                doCountdown();
            }
            render();
            break;
        }
    }
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function notify(msg, isErr=false) {
    S.notification = { msg, isErr };
    render();
    setTimeout(() => { S.notification = null; render(); }, 3500);
}

function dbg(msg) {
    S.debugLog.unshift('[' + new Date().toLocaleTimeString() + '] ' + msg);
    if (S.debugLog.length > 50) S.debugLog.pop();
    const el = document.getElementById('debug-log');
    if (el) el.innerHTML = S.debugLog.slice(0,20).join('\n');
}

function addChat(msg, type='player', color=null) {
    S.chatMessages.push({ msg, type, color, ts: Date.now() });
    render();
    setTimeout(() => { const el=document.getElementById('chat-scroll'); if(el) el.scrollTop=el.scrollHeight; }, 30);
}

function sendChat(msg) {
    const full = S.myName + ': ' + msg;
    addChat(full, 'player', S.myColor);
    broadcast({ type:'CHAT', name:S.myName, msg, color:S.myColor });
}

function fitClass(name) {
    if (name.length > 14) return 'fit-text fit-sm';
    if (name.length > 9)  return 'fit-text fit-md';
    return 'fit-text';
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => notify('✅ Đã copy!'));
}

function doCountdown() {
    // Guard: clear any existing countdown timer to prevent double-runs
    if (S._countdownTimer) { clearInterval(S._countdownTimer); S._countdownTimer = null; }

    S.countdown = 3;
    render();
    S._countdownTimer = setInterval(() => {
        S.countdown--;
        render();
        if (S.countdown <= 0) {
            clearInterval(S._countdownTimer);
            S._countdownTimer = null;
            S.countdown = null;
            // → go to role phase, NOT coding directly
            startRolePhase();
        }
    }, 1000);
}

// ─────────────────────────────────────────────
//  ROLE PHASE  — runs exactly 6 seconds then enters coding
// ─────────────────────────────────────────────
function startRolePhase() {
    // Assign roles: exactly 1 vibe coder chosen at random, rest are devs.
    // Host picks the vibe coder and broadcasts so everyone gets the SAME result.
    if (S.isHost) {
        const playerList = S.players;
        const idx = Math.floor(Math.random() * playerList.length);
        const vibeCoderPeerId = playerList[idx].peerId;
        // Broadcast role assignment to all members
        broadcast({ type: 'ROLE_ASSIGN', vibeCoderPeerId });
        applyRoles(vibeCoderPeerId);
    }
    // Members will receive ROLE_ASSIGN via handleMsg and call applyRoles themselves.
    // But if solo/testing (no connections), just assign locally for host too.
    if (Object.keys(S.connections).length === 0 && S.isHost) {
        // Already called applyRoles above — nothing extra needed
    }
}

function applyRoles(vibeCoderPeerId) {
    S.vibeCoderPeerId = vibeCoderPeerId;
    S.myRole = (S.peerId === vibeCoderPeerId) ? 'vibecoder' : 'dev';
    S.phase = 'role';
    S.roleTimer = 6;  // 6-second display window

    // Guard: clear any existing role timer
    if (S._roleTimer) { clearInterval(S._roleTimer); S._roleTimer = null; }

    render();

    S._roleTimer = setInterval(() => {
        S.roleTimer--;
        // Re-render to update countdown bar
        const bar = document.getElementById('role-timer-bar');
        const txt = document.getElementById('role-timer-txt');
        if (bar) bar.style.width = ((S.roleTimer / 6) * 100) + '%';
        if (txt) txt.textContent = S.roleTimer + 's';

        if (S.roleTimer <= 0) {
            clearInterval(S._roleTimer);
            S._roleTimer = null;
            S.phase = 'coding';
            S.roleTimer = null;
            // Reset coding timer
            S.codingTimer = 300;
            S.codingTimerRunning = false;
            if (S._codingTimerInterval) { clearInterval(S._codingTimerInterval); S._codingTimerInterval = null; }
            // Init file tracking: put me in current file
            S.fileActivePlayers = {};
            S.fileActivePlayers[S.currentFile] = [{ peerId: S.peerId||'local', name: S.myName, color: S.myColor }];
            render();
        }
    }, 1000);
}

async function toggleVoice() {
    if (S.voiceActive) {
        if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
        S.voiceActive = false;
        notify('🔇 Mic đã tắt');
    } else {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
            S.voiceActive = true;
            notify('🎙️ Mic đang hoạt động');
        } catch(e) {
            notify('❌ Không truy cập mic: ' + e.message, true);
        }
    }
    render();
}

// ─────────────────────────────────────────────
//  RENDER MAIN
// ─────────────────────────────────────────────
function render() {
    const app = document.getElementById('app');
    if (!app) return;

    let html = '';
    if      (S.phase === 'lobby')   html = renderLobby();
    else if (S.phase === 'waiting') html = renderWaiting();
    else if (S.phase === 'role')    html = renderRolePhase();
    else if (S.phase === 'coding')  html = renderCoding();

    if (S.notification) {
        const bg  = S.notification.isErr ? '#3b0000' : '#002200';
        const bdr = S.notification.isErr ? '#ef4444' : '#22c55e';
        const clr = S.notification.isErr ? '#fca5a5' : '#86efac';
        html += `<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;
            background:${bg};border:1px solid ${bdr};color:${clr};
            padding:10px 20px;border-radius:10px;font-size:12px;white-space:nowrap;pointer-events:none;
            animation:modalPop 0.2s ease;">${S.notification.msg}</div>`;
    }

    if (S.countdown !== null) {
        html += `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
            <div class="countdown-anim" style="font-size:160px;font-weight:700;color:#22c55e;text-shadow:0 0 80px #22c55e60;line-height:1;">${S.countdown}</div>
            <div style="color:#858585;font-size:14px;letter-spacing:0.1em;">GET READY TO CODE</div>
        </div>`;
    }

    app.innerHTML = html;

    setTimeout(() => {
        renderStatusBar();
        const cs = document.getElementById('chat-scroll');
        if (cs) cs.scrollTop = cs.scrollHeight;
    }, 10);
}

// ─────────────────────────────────────────────
//  ROLE PHASE RENDER
// ─────────────────────────────────────────────
function renderRolePhase() {
    const isDev = S.myRole === 'dev';

    // Gather all players for dev screen
    // Use S.players; fall back to a single "me" entry for solo testing
    const playerList = S.players.length > 0 ? S.players
        : [{ peerId: S.peerId, name: S.myName, color: S.myColor, avatar: S.myAvatar }];

    // The vibe coder player object
    const vibeCoderPlayer = playerList.find(p => p.peerId === S.vibeCoderPeerId)
        || { name: S.myName, color: S.myColor, avatar: S.myAvatar };

    const timerPct = ((S.roleTimer ?? 6) / 6) * 100;

    if (isDev) {
        // ── DEV / CREWMATE SCREEN ──────────────────────────────
        return `
        <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
            background:radial-gradient(ellipse at 50% 40%, #0a2a0a 0%, #050f05 60%, #000 100%);z-index:200;overflow:hidden;">

            <!-- Animated background grid -->
            <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(34,197,94,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(34,197,94,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

            <!-- Scan-line overlay -->
            <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;"></div>

            <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;max-width:600px;width:90%;padding:20px;">

                <!-- Role badge -->
                <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
                    <div style="font-size:56px;filter:drop-shadow(0 0 20px #22c55e);">💻</div>

// ─────────────────────────────────────────────
//  CODING TIMER LOGIC
// ─────────────────────────────────────────────
function startCodingTimer() {
    if (S._codingTimerInterval) return;
    S.codingTimerRunning = true;
    S._codingTimerInterval = setInterval(() => {
        S.codingTimer--;
        // Update timer display without full re-render
        const timerEl = document.getElementById('coding-timer-display');
        if (timerEl) {
            const m = Math.floor(S.codingTimer / 60);
            const s = S.codingTimer % 60;
            const isUrgent = S.codingTimer <= 30;
            timerEl.textContent = m + ':' + String(s).padStart(2,'0');
            timerEl.style.color = isUrgent ? '#ef4444' : '#22c55e';
            const timerBox = document.getElementById('coding-timer-box');
            if (timerBox) timerBox.style.borderColor = isUrgent ? '#ef444466' : '#22c55e44';
        }
        if (S.codingTimer <= 0) {
            clearInterval(S._codingTimerInterval);
            S._codingTimerInterval = null;
            S.codingTimerRunning = false;
            S.codingTimer = 0;
            // Auto run all files
            autoRunAllCode();
        }
    }, 1000);
}

function autoRunAllCode() {
    let out = `> AUTO-RUN — Tất cả file (Timer hết)\n\n`;
    Object.keys(files).forEach(fn => {
        const fi = files[fn];
        out += `── ${fn} (${fi.lang.toUpperCase()}) ──\n`;
        if (Math.random() < 0.25) {
            out += `❌ Error: Compilation failed\n\n`;
        } else {
            out += `✅ Compiled!\n`;
            const fake = { javascript:'🎮 "Game started!"', python:'🎮 Hello from Python', java:'🎮 Hello Java Game!', cpp:'🎮 Hello C++!' };
            out += (fake[fi.lang]||'Output: Game running!') + '\n\n';
        }
    });
    out += `\nProcess exited. Code 0`;
    S.terminalOutput = out;
    S.showRunResult = true;
    S.runResultSecs = 15;
    S.voteSkipCounts = 0;
    // Start 15s display countdown
    if (S._runResultTimer) clearInterval(S._runResultTimer);
    S._runResultTimer = setInterval(() => {
        S.runResultSecs--;
        const el = document.getElementById('run-result-timer');
        if (el) el.textContent = S.runResultSecs + 's';
        if (S.runResultSecs <= 0) {
            clearInterval(S._runResultTimer);
            S._runResultTimer = null;
            endRunResult();
        }
    }, 1000);
    render();
}

function endRunResult() {
    S.showRunResult = false;
    S.codingTimer = 300; // reset timer
    S.voteSkipCounts = 0;
    render();
    // restart timer after a tick
    setTimeout(startCodingTimer, 100);
}

function doVoteSkip() {
    // Simulated: in real multi-player, broadcast VOTE_SKIP and count
    S.voteSkipCounts++;
    const needed = Math.max(1, S.players.length || 1);
    const el = document.getElementById('vote-skip-count');
    if (el) el.textContent = S.voteSkipCounts + '/' + needed;
    notify('⏭️ Đã vote skip (' + S.voteSkipCounts + '/' + needed + ')');
    if (S.voteSkipCounts >= needed) {
        if (S._runResultTimer) { clearInterval(S._runResultTimer); S._runResultTimer = null; }
        endRunResult();
    }
}

function switchFile(fn) {
    // Save current file content from textarea
    const ta = document.querySelector('#code-editor-area');
    if (ta) files[S.currentFile].content = ta.value;

    // Track which player is editing which file
    if (!S.fileActivePlayers[fn]) S.fileActivePlayers[fn] = [];
    // Remove me from all files
    Object.keys(S.fileActivePlayers).forEach(f => {
        S.fileActivePlayers[f] = (S.fileActivePlayers[f]||[]).filter(p => p.peerId !== (S.peerId||'local'));
    });
    // Add me to new file
    const meObj = { peerId: S.peerId||'local', name: S.myName, color: S.myColor };
    if (!S.fileActivePlayers[fn]) S.fileActivePlayers[fn] = [];
    S.fileActivePlayers[fn].push(meObj);

    // Broadcast file switch to peers
    broadcast({ type:'FILE_SWITCH', peerId: S.peerId||'local', name: S.myName, color: S.myColor, file: fn });

    S.currentFile = fn;
    render();
}

    if (!S.tabsMinimized) {
        Object.keys(files).forEach((fn,i) => {

                ? `<div style="width:16px;height:16px;background:#22c55e;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;">👾</div>`
                : `<div style="width:12px;height:12px;border-radius:50%;background:${colors[i%colors.length]};flex-shrink:0;"></div>`;
            html += `<div onclick="S.currentFile='${fn}';render()" style="display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:11px;cursor:pointer;white-space:nowrap;border-radius:6px 6px 0 0;

    } else {

                    </div>
                    <div style="display:flex;gap:12px;justify-content:center;margin-top:16px;">
                        <button class="btn btn-green" style="padding:12px 28px;font-size:14px;" onclick="doConfirmVote()">✅ Xác nhận</button>
                        <button class="btn btn-amber" style="padding:12px 28px;font-size:14px;" onclick="doSkipVote()">⏭️ Skip</button>
                    </div>
                </div>
                ${chatP}
            </div>
        </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  ACTION HANDLERS
// ─────────────────────────────────────────────
function openModal(m) { S.modal = m; render(); }
function closeModal()  { S.modal = null; render(); }

function doCreateRoom() {
    const nameEl = document.getElementById('my-name');
    if (nameEl) S.myName = nameEl.value.trim() || S.myName;

    S.roomId     = document.getElementById('cr-id')?.value   || S.peerId;
    S.roomName   = document.getElementById('cr-name')?.value || 'My Room';
    S.maxPlayers = Math.min(5, Math.max(2, parseInt(document.getElementById('cr-max')?.value)||5));
    S.isHost     = true;
    S.players    = [{ peerId:S.peerId||'local', name:S.myName, color:S.myColor, avatar:S.myAvatar, isHost:true, readyVote:false }];
    S.chatMessages = [];
    S.modal      = null;
    S.phase      = 'waiting';
    notify('✅ Phòng "' + S.roomName + '" đã tạo!');
    render();
}

function doJoinRoom() {
    const nameEl = document.getElementById('my-name');
    if (nameEl) S.myName = nameEl.value.trim() || S.myName;

    const hostId = (document.getElementById('join-peer-id')?.value || '').trim();
    const nick   = (document.getElementById('join-name')?.value    || S.myName).trim();

    if (!hostId) { notify('❌ Nhập Room ID của host!', true); return; }
    if (hostId === S.peerId) { notify('❌ Đó là ID phòng của chính bạn!', true); return; }

    S.myName = nick;
    S.modal  = null;
    render();

    notify('🔌 Đang kết nối tới phòng...');
    connectToPeer(hostId, conn => {
        dbg('Connected to host, sending JOIN_REQUEST');
        conn.send({ type:'JOIN_REQUEST', name:S.myName, color:S.myColor, avatar:S.myAvatar });
    });
}

function prefillJoin(id) {
    openModal('join');
    setTimeout(() => {
        const el = document.getElementById('join-peer-id');
        if (el) el.value = id;
    }, 40);
}

function quickGame() {
    notify('⚡ Quick game: Tạo phòng mới để thử...');
    setTimeout(() => openModal('create'), 600);
}

function doExitRoom() {
    Object.values(S.connections).forEach(c => { try { c.close(); } catch(e){} });
    S.connections = {};
    S.players     = [];
    S.isHost      = false;
    S.roomId      = null;
    S.chatMessages = [];
    S.showChat    = false;
    S.modal       = null;
    S.phase       = 'lobby';
    // Clean up coding timers
    if (S._codingTimerInterval) { clearInterval(S._codingTimerInterval); S._codingTimerInterval = null; }
    if (S._runResultTimer) { clearInterval(S._runResultTimer); S._runResultTimer = null; }
    S.codingTimerRunning = false;
    S.showRunResult = false;
    S.codingTimer = 300;
    render();
}

function doHostStart() {
    if (!S.isHost) return;
    broadcast({ type:'START_COUNTDOWN' });
    doCountdown();
}

function doVoteStart() {
    const host = S.players.find(p => p.isHost);
    if (host && host.peerId !== S.peerId) {
        send(host.peerId, { type:'VOTE_REQUEST' });
        notify('🗳️ Đã gửi vote bắt đầu sớm');
    } else {
        doHostStart();
    }
}

function doSendChat() {
    const el = document.getElementById('chat-in');
    if (!el || !el.value.trim()) return;
    sendChat(el.value.trim());
    el.value = '';
}

function doSaveSettings() {
    const rt = parseInt(document.getElementById('s-round')?.value)   || 60;
    const mt = parseInt(document.getElementById('s-meeting')?.value) || 30;
    S.roundTime   = rt;
    S.meetingTime = mt;
    broadcast({ type:'SETTINGS_UPDATE', roundTime:rt, meetingTime:mt });
    notify('✅ Đã chỉnh sửa thành công!');
    closeModal();
}

function doRunCode() {
    const fi = files[S.currentFile];
    let out = `> vscode-terminal: ${S.currentFile} (${fi.lang.toUpperCase()})\n\n🔨 Compiling ${fi.lang}...\n`;
    if (Math.random() < 0.3) {
        out += `❌ Error: Unexpected token\n(Generic compilation failure)\n`;
    } else {
        out += `✅ Compiled successfully!\n🚀 Executing...\n`;
        const fake = { javascript:'🎮 "Game started!"', python:'🎮 Hello from Python', java:'🎮 Hello Java Game!', cpp:'🎮 Hello C++!' };
        out += (fake[fi.lang]||'Output: Game running!') + '\n\nProcess exited with code 0';
    }
    S.terminalOutput = out;
    S.showTerminal   = true;
    render();
}

function doConfirmVote() { if (S.selectedVote) notify('✅ Vote xác nhận!'); S.showMeeting=false; render(); }
function doSkipVote()    { notify('⏭️ Vote skipped'); S.showMeeting=false; render(); }

function doMeetingChat() {
    const el = document.getElementById('mc-in');
    if (!el || !el.value.trim()) return;
    S.meetingChatMessages.push({ from:S.myName, msg:el.value.trim() });
    el.value = '';
    render();
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
window.onload = () => {
    render();
    initPeer();
    console.log('%c🚀 CodeAmong v3 — PeerJS WebRTC', 'color:#007acc;font-size:13px;font-weight:bold;');
};
</script>
</body>
</html>
